name: Frontend CI/CD

on:
    pull_request:
        paths:
            - "frontend/**"
            - ".github/workflows/frontend.yml"
    push:
        branches: [main]
        paths:
            - "frontend/**"
            - ".github/workflows/frontend.yml"

permissions:
    id-token: write
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
            - run: npm ci --no-audit --no-fund
            - run: npm run build

    build-and-deploy:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        needs: test
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v4
            - uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            - uses: azure/cli@v2
              with:
                  inlineScript: |
                      az acr login --name ${{ vars.ACR_NAME }}
            - name: Build and push frontend image
              run: |
                  docker build -t ${{ vars.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }} ./frontend
                  docker push ${{ vars.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
            - name: Deploy to AKS
              run: |
                  export IMAGE="${{ vars.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}"
                  envsubst < k8s/base/frontend.yaml | kubectl apply -f -
              env:
                  KUBECONFIG: ${{ secrets.KUBECONFIG }}
