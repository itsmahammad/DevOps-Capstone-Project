# Production overrides for backend Helm chart.
replicaCount: 3
image:
  pullPolicy: IfNotPresent
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
pdb:
  enabled: true
  minAvailable: 1
ingress:
  enabled: true
  className: nginx
  # Development/testing: access by Ingress LoadBalancer IP.
  # No host, no TLS, no cert-manager, HTTPS redirect disabled.
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: ""  # empty -> host-less rule (matches the LoadBalancer IP)
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # To re-enable production TLS with a custom domain, uncomment and set the host:
  # annotations:
  #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  # hosts:
  #   - host: api.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - hosts:
  #       - api.example.com
  #     secretName: backend-tls

rollingUpdate:
  maxUnavailable: 1
  maxSurge: 1
env:
  PORT: "8000"
  HOST: "0.0.0.0"
  DEBUG: "false"
  CORS_ORIGINS: "*"
  MAX_FILE_SIZE_MB: "5"
  ALLOWED_EXTENSIONS: ".pdf,.docx"
secretProviderClass:
  enabled: true
  keyVaultName: "kv-bugslayers-prod"
  tenantId: ""
  secrets:
    - name: sql-admin-password
      objectName: sql-admin-password
      key: sql-admin-password
