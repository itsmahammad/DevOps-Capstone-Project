# Default values for backend Helm chart.
# The backend needs more CPU/memory than the frontend due to Tesseract OCR spikes.

replicaCount: 2

image:
  repository: ""  # Set by CD pipeline, e.g. acrresumeatsprod.azurecr.io/backend
  tag: ""         # Set by CD pipeline, e.g. git commit SHA
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx

  annotations: {}

  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix

  tls: []

resources:
  # Backend needs headroom for Tesseract OCR spikes (PDF -> image -> OCR is CPU/memory intensive)
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

probes:
  readiness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

env:
  PORT: "8000"
  HOST: "0.0.0.0"
  DEBUG: "false"
  CORS_ORIGINS: "*"
  MAX_FILE_SIZE_MB: "5"
  ALLOWED_EXTENSIONS: ".pdf,.docx"

secretProviderClass:
  enabled: false
  keyVaultName: ""
  tenantId: ""
  secrets: []

networkPolicy:
  enabled: true
  # Only allow ingress from frontend pods
  allowFromFrontend: true

rollingUpdate:
  maxUnavailable: 1
  maxSurge: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""
