# Default values for frontend Helm chart.
# Override these in values-production.yaml for production deployments.

replicaCount: 2

image:
  repository: ""  # Set by CD pipeline, e.g. acrresumeatsprod.azurecr.io/frontend
  tag: ""         # Set by CD pipeline, e.g. git commit SHA
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx

  # Development/testing: access the app directly by the Ingress
  # LoadBalancer IP. No host, no TLS, no cert-manager, no HTTPS redirect.
  # For production with a custom domain + TLS, see values-production.yaml.
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

  hosts:
    - host: ""  # empty -> host-less rule (matches the LoadBalancer IP)
      paths:
        - path: /
          pathType: Prefix

  tls: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  readiness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 20
    periodSeconds: 20

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

env:
  # Non-public env var — read at RUNTIME by the Next.js server (next.config.js),
  # NOT baked into the build. This avoids the localhost:8000 build-time issue
  # where NEXT_PUBLIC_* vars are inlined into the standalone bundle at build time.
  API_URL: "http://backend.resumeats-prod.svc.cluster.local"

secretProviderClass:
  enabled: false
  keyVaultName: ""
  tenantId: ""
  secrets: []

networkPolicy:
  enabled: true

rollingUpdate:
  maxUnavailable: 1
  maxSurge: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""