# Production overrides for frontend Helm chart.
replicaCount: 3
image:
  pullPolicy: IfNotPresent
ingress:
  enabled: true
  className: nginx
  # Development/testing: access by Ingress LoadBalancer IP.
  # No host, no TLS, no cert-manager, HTTPS redirect disabled.
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: ""  # empty -> host-less rule (matches the LoadBalancer IP)
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # To re-enable production TLS with a custom domain, uncomment and set the host:
  # annotations:
  #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  # hosts:
  #   - host: app.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - hosts:
  #       - app.example.com
  #     secretName: frontend-tls
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
rollingUpdate:
  maxUnavailable: 1
  maxSurge: 1
env:
  NEXT_PUBLIC_API_URL: "http://backend.resumeats-prod.svc.cluster.local"
secretProviderClass:
  enabled: true
  keyVaultName: "kv-bugslayers-prod"
  tenantId: ""
  secrets:
    - name: sql-admin-password
      objectName: sql-admin-password
      key: sql-admin-password
