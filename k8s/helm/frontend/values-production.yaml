# Production overrides for frontend Helm chart.
replicaCount: 3
image:
  pullPolicy: IfNotPresent
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: app.example.com
  tls:
    enabled: true
    secretName: frontend-tls
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
rollingUpdate:
  maxUnavailable: 1
  maxSurge: 1
env:
  NEXT_PUBLIC_API_URL: "http://backend.resumeats-prod.svc.cluster.local"
secretProviderClass:
  enabled: true
  keyVaultName: "kv-resumeats-prod"
  tenantId: ""
  secrets:
    - name: sql-admin-password
      objectName: sql-admin-password
      key: sql-admin-password
